name: 🚀 deploy

on:
  release:
    types: [ published ]
   workflow_dispatch:

permissions:
  id-token: write

jobs:
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Checkout
        uses: actions/checkout@v4
      - name: 🟢 Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: 🕵 Yarn install
        uses: borales/actions-yarn@v4
        with:
          cmd: install
      - name: 🏗 Build
        uses: borales/actions-yarn@v4
        with:
          cmd: build-lib
